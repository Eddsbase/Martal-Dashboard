// ─── CUSTOM SVG CHARTS (no external library) ──────────────────────────────────
function useContainerWidth(ref){
  const [w,setW]=useState(600);
  useEffect(()=>{
    if(!ref.current)return;
    const ro=new ResizeObserver(e=>setW(Math.max(e[0].contentRect.width,100)));
    ro.observe(ref.current);
    return()=>ro.disconnect();
  },[]);
  return w;
}

// Colored bar chart (one color per bar via colorFn)
function SvgBarChart({data,dataKey,colorFn,xKey='m',yFmt=v=>v,height=130}){
  const ref=useRef(null); const w=useContainerWidth(ref);
  const [tip,setTip]=useState(null);
  const pad={l:36,r:8,t:8,b:22};
  const cW=w-pad.l-pad.r, cH=height-pad.t-pad.b;
  const vals=data.map(d=>d[dataKey]).filter(v=>v!=null&&!isNaN(v));
  const maxV=Math.max(...vals,0.01);
  const gap=cW/data.length;
  const bW=Math.max(3,gap*0.65);
  const yTicks=[0,maxV*0.5,maxV].map(v=>parseFloat(v.toFixed(1)));
  return(
    <div ref={ref} style={{width:'100%',height}}>
      <svg width={w} height={height}>
        {yTicks.map((t,i)=>{const y=pad.t+cH-(t/maxV)*cH;return(<g key={i}><line x1={pad.l} y1={y} x2={pad.l+cW} y2={y} stroke={BORDER} strokeDasharray="3 3"/><text x={pad.l-3} y={y+3} textAnchor="end" fontSize={8} fill={MUTED} fontFamily={FONT_BODY}>{yFmt(t)}</text></g>);})}
        {data.map((d,i)=>{
          const v=d[dataKey]; if(v==null||isNaN(v))return null;
          const bH=(v/maxV)*cH; const x=pad.l+i*gap+(gap-bW)/2; const y=pad.t+cH-bH;
          const fill=colorFn?colorFn(v):'#5aab1f';
          return(<rect key={i} x={x} y={y} width={bW} height={Math.max(bH,0)} fill={fill} rx={2} onMouseEnter={()=>setTip({x:x+bW/2,y,v,label:d[xKey]})} onMouseLeave={()=>setTip(null)}/>);
        })}
        {data.map((d,i)=>{if(i%(Math.ceil(data.length/8))!==0&&i!==data.length-1)return null;return(<text key={i} x={pad.l+i*gap+gap/2} y={height-4} textAnchor="middle" fontSize={8} fill={MUTED} fontFamily={FONT_BODY}>{d[xKey]}</text>);})}
        <line x1={pad.l} y1={pad.t+cH} x2={pad.l+cW} y2={pad.t+cH} stroke={BORDER2}/>
        {tip&&(<g><rect x={Math.min(tip.x-24,w-54)} y={tip.y-28} width={48} height={20} rx={3} fill="#0d0d0d" opacity={0.82}/><text x={Math.min(tip.x-24,w-54)+24} y={tip.y-14} textAnchor="middle" fontSize={9} fill="#fff" fontWeight="700" fontFamily={FONT_BODY}>{yFmt(tip.v)}</text></g>)}
      </svg>
    </div>
  );
}

// Multi-series bar chart (grouped, two bars per data point)
function SvgGroupedBarChart({data,series,xKey='m',height=120}){
  const ref=useRef(null); const w=useContainerWidth(ref);
  const [tip,setTip]=useState(null);
  const pad={l:30,r:8,t:8,b:22};
  const cW=w-pad.l-pad.r, cH=height-pad.t-pad.b;
  const allVals=series.flatMap(s=>data.map(d=>d[s.key]||0));
  const maxV=Math.max(...allVals,0.01);
  const gap=cW/data.length;
  const groupW=gap*0.8; const bW=groupW/series.length;
  const yTicks=[0,Math.round(maxV*0.5),Math.round(maxV)];
  return(
    <div ref={ref} style={{width:'100%',height}}>
      <svg width={w} height={height}>
        {yTicks.map((t,i)=>{const y=pad.t+cH-(t/maxV)*cH;return(<g key={i}><line x1={pad.l} y1={y} x2={pad.l+cW} y2={y} stroke={BORDER} strokeDasharray="3 3"/><text x={pad.l-3} y={y+3} textAnchor="end" fontSize={8} fill={MUTED} fontFamily={FONT_BODY}>{t}</text></g>);})}
        {data.map((d,di)=>series.map((s,si)=>{
          const v=d[s.key]||0; const bH=(v/maxV)*cH;
          const x=pad.l+di*gap+(gap-groupW)/2+si*bW; const y=pad.t+cH-bH;
          return(<rect key={`${di}-${si}`} x={x} y={y} width={Math.max(bW-1,2)} height={Math.max(bH,0)} fill={s.fill} rx={2} onMouseEnter={()=>setTip({x:x+bW/2,y,label:s.name,v})} onMouseLeave={()=>setTip(null)}/>);
        }))}
        {data.map((d,i)=>{if(i%(Math.ceil(data.length/8))!==0&&i!==data.length-1)return null;return(<text key={i} x={pad.l+i*gap+gap/2} y={height-4} textAnchor="middle" fontSize={8} fill={MUTED} fontFamily={FONT_BODY}>{d[xKey]}</text>);})}
        <line x1={pad.l} y1={pad.t+cH} x2={pad.l+cW} y2={pad.t+cH} stroke={BORDER2}/>
        {/* Legend */}
        {series.map((s,i)=>(<g key={i}><rect x={pad.l+i*70} y={2} width={8} height={8} fill={s.fill} rx={1}/><text x={pad.l+i*70+11} y={9} fontSize={8} fill={MUTED} fontFamily={FONT_BODY}>{s.name}</text></g>))}
        {tip&&(<g><rect x={Math.min(tip.x-24,w-60)} y={tip.y-28} width={56} height={20} rx={3} fill="#0d0d0d" opacity={0.82}/><text x={Math.min(tip.x-24,w-60)+28} y={tip.y-14} textAnchor="middle" fontSize={9} fill="#fff" fontWeight="700" fontFamily={FONT_BODY}>{tip.label}: {tip.v}</text></g>)}
      </svg>
    </div>
  );
}

// Multi-line chart
function SvgLineChart({data,lines=[],xKey='m',height=100}){
  const ref=useRef(null); const w=useContainerWidth(ref);
  const [tip,setTip]=useState(null);
  const pad={l:30,r:8,t:8,b:22};
  const cW=w-pad.l-pad.r, cH=height-pad.t-pad.b;
  const allVals=lines.flatMap(l=>data.map(d=>d[l.key]).filter(v=>v!=null&&!isNaN(v)));
  const maxV=Math.max(...allVals,0.01); const minV=0;
  const xS=i=>pad.l+(i/(Math.max(data.length-1,1)))*cW;
  const yS=v=>pad.t+cH-((v-minV)/(maxV-minV||1))*cH;
  const yTicks=[0,Math.round(maxV*0.5),Math.round(maxV)];
  return(
    <div ref={ref} style={{width:'100%',height}}>
      <svg width={w} height={height}>
        {yTicks.map((t,i)=>{const y=yS(t);return(<g key={i}><line x1={pad.l} y1={y} x2={pad.l+cW} y2={y} stroke={BORDER} strokeDasharray="3 3"/><text x={pad.l-3} y={y+3} textAnchor="end" fontSize={8} fill={MUTED} fontFamily={FONT_BODY}>{t}</text></g>);})}
        {lines.map((l,li)=>{
          const pts=data.map((d,i)=>{const v=d[l.key];return v!=null?`${xS(i)},${yS(v)}`:null;}).filter(Boolean).join(' ');
          return(<polyline key={li} points={pts} fill="none" stroke={l.stroke||'#34d399'} strokeWidth={l.width||2}/>);
        })}
        {data.map((d,i)=>{if(i%(Math.ceil(data.length/7))!==0&&i!==data.length-1)return null;return(<text key={i} x={xS(i)} y={height-4} textAnchor="middle" fontSize={8} fill={MUTED} fontFamily={FONT_BODY}>{d[xKey]}</text>);})}
        <line x1={pad.l} y1={pad.t+cH} x2={pad.l+cW} y2={pad.t+cH} stroke={BORDER2}/>
        {lines.length>1&&lines.map((l,i)=>(<g key={i}><line x1={pad.l+i*70} y1={height-2} x2={pad.l+i*70+14} y2={height-2} stroke={l.stroke} strokeWidth={2}/><text x={pad.l+i*70+17} y={height-1} fontSize={8} fill={MUTED} fontFamily={FONT_BODY}>{l.name}</text></g>))}
      </svg>
    </div>
  );
}

function personMonthly(accs) {
  return ALL_M.map(m=>{
    const mi=mIdx(m); let ac=0,cl=0;
    accs.forEach(a=>{
      const s=mIdx(a.start),e=a.end?mIdx(a.end):Infinity;
      if(s<=mi){if(!a.end)ac++;else if(e===mi)cl++;else if(e>mi)ac++;}
    });
    return{m,ac,cl};
  }).filter(d=>d.ac>0||d.cl>0);
}
function personCR(accs){
  const mo=personMonthly(accs);
  return withCR(mo).filter(d=>d.cr!==null&&d.ac>0);
}

function sqlPaceStatus(cur, marchSQL){
  if(marchSQL===null||marchSQL===undefined) return null;
  const projected=Math.round(cur/APR_ELAPSED);
  const pct=marchSQL>0?projected/marchSQL:null;
  if(pct===null) return {label:"No March data",color:MUTED,projected};
  if(pct>=1.1)   return {label:"Ahead of March pace",color:"#3a8c0f",projected};
  if(pct>=0.85)  return {label:"On March pace",color:"#f5c518",projected};
  if(pct>=0.5)   return {label:"Behind March pace",color:"#f97316",projected};
  return           {label:"Well behind March pace",color:"#ef4444",projected};
}

function paceCol(val,key){
  if(key==="mtg") return val>=8?"#3a8c0f":val>=4?"#f5c518":val>=1?"#f97316":"#ef4444";
  if(key==="sql") return val>=15?"#3a8c0f":val>=8?"#f5c518":val>=3?"#f97316":"#ef4444";
  if(key==="mql") return val>=40?"#3a8c0f":val>=20?"#f5c518":val>=8?"#f97316":"#ef4444";
  return MUTED;
}

function PacePanel({repName}){
  const p=REP_PACE[repName];
  if(!p) return null;
  const sqlStatus=sqlPaceStatus(p.curSQL,p.marchSQL);
  const borderCol=sqlStatus?.color||BORDER2;

  // Helper: one comparison row for any metric
  function MetricRow({label,marchVal,curVal,marchMax,key}){
    const proj=Math.round(curVal/APR_ELAPSED);
    const delta=marchVal!=null?curVal-Math.round(marchVal*APR_ELAPSED):null;
    const projCol=marchVal!=null?(proj>=marchVal*1.1?"#3a8c0f":proj>=marchVal*0.85?"#f5c518":"#ef4444"):paceCol(curVal,key);
    const barMax=marchMax||Math.max(marchVal||1,curVal,proj,1);
    const barTrack={flex:1,height:5,background:"#e5e5e5",borderRadius:3,overflow:"hidden"};
    const subLabel={fontSize:10,color:MUTED,fontFamily:FONT_BODY,width:74,flexShrink:0};
    const numStyle=(c)=>({fontWeight:700,fontSize:14,color:c,fontFamily:FONT_DISPLAY,minWidth:32,textAlign:"right"});
    const curPct  = marchVal!=null&&marchVal>0 ? Math.round((curVal/marchVal)*100) : null;
    const projPct = marchVal!=null&&marchVal>0 ? Math.round((proj/marchVal)*100)   : null;
    const pctCol=(pct)=>pct==null?MUTED:pct>=110?"#3a8c0f":pct>=85?"#f5c518":"#ef4444";
    return(
      <div style={{padding:"9px 0",borderBottom:`1px solid ${BORDER}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
          <div style={{fontSize:9,fontWeight:800,letterSpacing:"1.5px",textTransform:"uppercase",color:MUTED,fontFamily:FONT_BODY}}>{label}</div>
          {(curPct!=null||projPct!=null)&&(
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {curPct!=null&&(
                <span style={{fontSize:11,fontWeight:800,color:pctCol(curPct),fontFamily:FONT_DISPLAY,background:"#f3f3f3",borderRadius:4,padding:"1px 7px"}}>
                  {curPct}% now
                </span>
              )}
              {projPct!=null&&(
                <span style={{fontSize:11,fontWeight:800,color:pctCol(projPct),fontFamily:FONT_DISPLAY,background:pctCol(projPct)==="#3a8c0f"?"#f0f7e8":pctCol(projPct)==="#f5c518"?"#fffbea":"#fff0f0",borderRadius:4,padding:"1px 7px",border:`1px solid ${pctCol(projPct)}33`}}>
                  → {projPct}% proj
                </span>
              )}
            </div>
          )}
        </div>
        {/* March final */}
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
          <span style={subLabel}>March final</span>
          <span style={numStyle(MUTED)}>{marchVal??'—'}</span>
          <div style={{...barTrack}}>
            <div style={{width:`${Math.min(100,marchVal!=null?marchVal/barMax*100:0)}%`,height:"100%",background:"#c0c0c0",borderRadius:3}}/>
          </div>
        </div>
        {/* April MTD */}
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
          <span style={{...subLabel,color:paceCol(curVal,key),fontWeight:700}}>April MTD</span>
          <span style={numStyle(paceCol(curVal,key))}>{curVal}</span>
          <div style={{...barTrack}}>
            <div style={{width:`${Math.min(100,curVal/barMax*100)}%`,height:"100%",background:paceCol(curVal,key),borderRadius:3}}/>
          </div>
          {delta!=null&&<span style={{fontSize:10,fontWeight:700,color:delta>=0?"#3a8c0f":"#ef4444",fontFamily:FONT_BODY,whiteSpace:"nowrap",marginLeft:2}}>{delta>=0?"+":""}{delta} vs pace</span>}
        </div>
        {/* Projected */}
        {marchVal!=null&&(
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{...subLabel,color:projCol,fontWeight:700}}>Proj EOM</span>
            <span style={numStyle(projCol)}>{proj}</span>
            <div style={{...barTrack}}>
              <div style={{width:`${Math.min(100,proj/barMax*100)}%`,height:"100%",background:projCol,borderRadius:3,opacity:0.55}}/>
            </div>
            <span style={{fontSize:10,color:projCol,fontWeight:700,fontFamily:FONT_BODY,whiteSpace:"nowrap",marginLeft:2}}>vs {marchVal} last mo</span>
          </div>
        )}
      </div>
    );
  }

  return(
    <div style={{...CS,border:`2px solid ${borderCol}`,background:"#fafcf8",marginBottom:12}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:8}}>

            <div style={{fontSize:9,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",opacity:0.6,fontFamily:FONT_BODY}}>March Rank</div>
            <div style={{fontSize:22,fontWeight:800,fontFamily:FONT_DISPLAY,lineHeight:1.1}}>#{p.marchRank}</div>

      </div>
    </div>
  );
}

// SOM-level pace aggregate table
function SomPaceTable({reps}){
  const rows=reps.filter(r=>REP_PACE[r]).map(r=>({name:r,...REP_PACE[r]}));
  if(!rows.length) return null;
  const sorted=[...rows].sort((a,b)=>{
    const projA=a.marchSQL?Math.round(a.curSQL/APR_ELAPSED)/a.marchSQL:0;
    const projB=b.marchSQL?Math.round(b.curSQL/APR_ELAPSED)/b.marchSQL:0;
    return projB-projA;
  });
  const totals={
    mql:rows.reduce((s,r)=>s+r.curMQL,0), sql:rows.reduce((s,r)=>s+r.curSQL,0), mtg:rows.reduce((s,r)=>s+r.curMtg,0),
    marchSQL:rows.reduce((s,r)=>s+(r.marchSQL||0),0), marchMtg:rows.reduce((s,r)=>s+(r.marchFlips||0),0), marchMQL:rows.reduce((s,r)=>s+(r.marchMQL||0),0),
  };
  const pctBadge=(cur,march)=>{
    if(!march) return null;
    const now=Math.round((cur/march)*100);
    const proj=Math.round((cur/APR_ELAPSED/march)*100);
    const col=(p)=>p>=110?"#3a8c0f":p>=85?"#f5c518":"#ef4444";
    return(
      <div style={{fontSize:9,fontFamily:FONT_BODY,marginTop:2,display:"flex",gap:3,justifyContent:"center",flexWrap:"wrap"}}>
        <span style={{color:col(now),fontWeight:700}}>{now}%</span>
        <span style={{color:MUTED}}>→</span>
        <span style={{color:col(proj),fontWeight:700}}>{proj}%</span>
      </div>
    );
  };
  return(
    <div style={{...CS,border:`1px solid #d4d4d4`,background:"#fafcf8"}}>
      <SectionLabel>Team PACE — April MTD vs March Final</SectionLabel>
      <div style={{fontSize:10,color:MUTED,fontFamily:FONT_BODY,marginBottom:8}}>% columns: <strong>now%</strong> → <strong>proj%</strong> of March final</div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,fontFamily:FONT_BODY}}>
          <thead>
            <tr style={{borderBottom:`2px solid ${BORDER2}`}}>
              {["Rep","Mar Rank","SQLs","% of Mar","Proj EOM","Meetings","% of Mar","MQLs","% of Mar","Status"].map(h=>(
                <th key={h} style={{padding:"6px 8px",textAlign:h==="Rep"?"left":"center",color:MUTED,fontWeight:700,fontSize:9,textTransform:"uppercase",letterSpacing:"1px",whiteSpace:"nowrap"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {sorted.map((r,i)=>{
              const status=sqlPaceStatus(r.curSQL,r.marchSQL);
              return(
                <tr key={r.name} style={{borderBottom:`1px solid ${BORDER}`,background:i%2?CARD3:"transparent"}}>
                  <td style={{padding:"6px 8px",color:TEXT,fontWeight:500,whiteSpace:"nowrap"}}>{r.name}</td>
                  <td style={{padding:"6px 8px",textAlign:"center",color:MUTED}}>{r.marchRank!=null?`#${r.marchRank}`:"—"}</td>
                  <td style={{padding:"6px 8px",textAlign:"center"}}>
                    <div style={{fontWeight:700,color:paceCol(r.curSQL,"sql")}}>{r.curSQL}</div>
                    <div style={{fontSize:9,color:MUTED}}>{r.marchSQL??'—'} last mo</div>
                  </td>
                  <td style={{padding:"4px 8px",textAlign:"center"}}>{pctBadge(r.curSQL,r.marchSQL)}</td>
                  <td style={{padding:"6px 8px",textAlign:"center",fontWeight:700,color:status?.color||MUTED}}>{status?.projected??'—'}</td>
                  <td style={{padding:"6px 8px",textAlign:"center"}}>
                    <div style={{fontWeight:600,color:paceCol(r.curMtg,"mtg")}}>{r.curMtg}</div>
                    <div style={{fontSize:9,color:MUTED}}>{r.marchFlips??'—'} last mo</div>
                  </td>
                  <td style={{padding:"4px 8px",textAlign:"center"}}>{pctBadge(r.curMtg,r.marchFlips)}</td>
                  <td style={{padding:"6px 8px",textAlign:"center"}}>
                    <div style={{color:paceCol(r.curMQL,"mql")}}>{r.curMQL}</div>
                    <div style={{fontSize:9,color:MUTED}}>{r.marchMQL??'—'} last mo</div>
                  </td>
                  <td style={{padding:"4px 8px",textAlign:"center"}}>{pctBadge(r.curMQL,r.marchMQL)}</td>
                  <td style={{padding:"6px 8px",textAlign:"center"}}>
                    {status?<span style={{fontSize:10,fontWeight:700,color:status.color,whiteSpace:"nowrap"}}>{status.label}</span>:<span style={{color:MUTED2}}>—</span>}
                  </td>
                </tr>
              );
            })}
            <tr style={{borderTop:`2px solid ${BORDER2}`,background:CARD3}}>
              <td style={{padding:"6px 8px",fontWeight:700,color:TEXT}}>TEAM TOTAL</td>
              <td/>
              <td style={{padding:"6px 8px",textAlign:"center"}}>
                <div style={{fontWeight:700}}>{totals.sql}</div>
                <div style={{fontSize:9,color:MUTED}}>{totals.marchSQL} last mo</div>
              </td>
              <td style={{padding:"4px 8px",textAlign:"center"}}>{pctBadge(totals.sql,totals.marchSQL)}</td>
              <td/>
              <td style={{padding:"6px 8px",textAlign:"center"}}>
                <div style={{fontWeight:700}}>{totals.mtg}</div>
                <div style={{fontSize:9,color:MUTED}}>{totals.marchMtg} last mo</div>
              </td>
              <td style={{padding:"4px 8px",textAlign:"center"}}>{pctBadge(totals.mtg,totals.marchMtg)}</td>
              <td style={{padding:"6px 8px",textAlign:"center"}}>
                <div style={{fontWeight:700}}>{totals.mql}</div>
                <div style={{fontSize:9,color:MUTED}}>{totals.marchMQL} last mo</div>
              </td>
              <td style={{padding:"4px 8px",textAlign:"center"}}>{pctBadge(totals.mql,totals.marchMQL)}</td>
              <td/>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

function getRepAccounts(repName) {
  const accs=[];
  SOMS.forEach(s=>{
    s.accounts.forEach(a=>{
      if(a.reps&&a.reps.includes(repName)) accs.push({...a,som:s.name});
    });
  });
  return accs;
}

// ─── PERSON CHARTS ────────────────────────────────────────────────────────────
function PersonCharts({accounts,perf,repName}) {
  const crTrend=useMemo(()=>personCR(accounts),[accounts]);
  const moAc=useMemo(()=>personMonthly(accounts),[accounts]);
  const active=accounts.filter(a=>!a.end).length;
  const lost=accounts.filter(a=>a.end).length;
  const total=accounts.length;
  const cr=total?((lost/total)*100).toFixed(1):0;
  const latest=crTrend[crTrend.length-1];
  const avg12=crTrend.slice(-12);
  const avgCR=avg12.length?(avg12.reduce((s,d)=>s+d.cr,0)/avg12.length).toFixed(1):"-";
  const cs=churnScore(accounts);
  return(
    <div>
      {repName&&<PacePanel repName={repName}/>}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
        <Stat label="Active Accounts" value={active} color="#3a8c0f"/>
        <Stat label="Churned" value={lost} color="#f87171"/>
        <Stat label="Acct Churn Rate" value={`${cr}%`} color={crCol(parseFloat(cr))} sub="churned ÷ total"/>
        <Stat label="Latest Monthly CR" value={latest?`${latest.cr}%`:"-"} color={crCol(latest?.cr)} sub={latest?.m||""}/>
        <Stat label="12-Mo Avg CR" value={`${avgCR}%`} color="#8dc63f"/>
        <Stat label="Churn Score" value={cs} color={cs<15?"#3a8c0f":cs<35?"#8dc63f":"#bcd97a"} sub="lower = better"/>
      </div>
      {crTrend.length>0&&<div style={CS}>
        <SectionLabel>Churn Rate Trend — Lost ÷ Avg Active (prior 3 months)</SectionLabel>
        <SvgBarChart data={crTrend} dataKey="cr" colorFn={crCol} xKey="m" yFmt={v=>`${v}%`} height={130}/>
      </div>}
      {moAc.length>0&&<div style={CS}>
        <SectionLabel>Active Accounts Trend</SectionLabel>
        <SvgLineChart data={moAc} lines={[{key:'ac',stroke:'#34d399',width:2}]} xKey="m" height={100}/>
      </div>}
      {perf&&perf.length>0&&<div style={CS}>
        <SectionLabel>MQL / SQL / Meetings Trend</SectionLabel>
        <SvgLineChart data={perf} lines={[{key:'mql',name:'MQLs',stroke:'#a78bfa',width:2},{key:'sql',name:'SQLs',stroke:'#38bdf8',width:2},{key:'mtg',name:'Meetings',stroke:'#34d399',width:2}]} xKey="m" height={130}/>
      </div>}
      <div style={CS}>
        <SectionLabel>Account Detail — {total} accounts</SectionLabel>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,fontFamily:FONT_BODY}}>
            <thead>
              <tr style={{borderBottom:`1px solid ${BORDER2}`}}>
                {["Account","Start","Status","Reason","Reps"].map(h=>(
                  <th key={h} style={{padding:"6px 10px",textAlign:"left",color:MUTED,fontWeight:700,fontSize:9,letterSpacing:"1px",textTransform:"uppercase"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {[...accounts].sort((a,b)=>a.end?1:-1).map((a,i)=>(
                <tr key={i} style={{borderBottom:`1px solid ${BORDER}`,background:i%2?CARD3:"transparent"}}>
                  <td style={{padding:"7px 10px",color:TEXT,fontWeight:500}}>{a.name}</td>
                  <td style={{padding:"7px 10px",color:MUTED,fontSize:11}}>{a.start}</td>
                  <td style={{padding:"7px 10px"}}>{a.end?<Pill label={`Churned ${a.end}`} color="#ef4444"/>:<Pill label="Active" color={G}/>}</td>
                  <td style={{padding:"7px 10px"}}>{a.reason?<Pill label={a.reason} color={rsnCol(a.reason)}/>:<span style={{color:MUTED2}}>—</span>}</td>
                  <td style={{padding:"7px 10px",color:MUTED,fontSize:11}}>{a.reps?.join(", ")||"—"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function CompanyPaceCard(){
  const proj={
    mql: Math.round(APR_MTD_CO.mql/APR_ELAPSED),
    sql: Math.round(APR_MTD_CO.sql/APR_ELAPSED),
    mtg: Math.round(APR_MTD_CO.mtg/APR_ELAPSED),
  };
  const gap={
    mql: Math.max(0, MARCH_CO.mql - APR_MTD_CO.mql),
    sql: Math.max(0, MARCH_CO.sql - APR_MTD_CO.sql),
    mtg: Math.max(0, MARCH_CO.mtg - APR_MTD_CO.mtg),
  };
  const sqlProjPct  = Math.round((proj.sql/MARCH_CO.sql)*100);
  const mtgProjPct  = Math.round((proj.mtg/MARCH_CO.mtg)*100);
  const mqlProjPct  = Math.round((proj.mql/MARCH_CO.mql)*100);
  const sqlNowPct   = Math.round((APR_MTD_CO.sql/MARCH_CO.sql)*100);
  const overallStatus = proj.sql >= MARCH_CO.sql * 1.1
    ? {label:`Ahead of March — projecting ${sqlProjPct}% of March SQLs · ${mtgProjPct}% of Meetings · ${mqlProjPct}% of MQLs`, color:"#3a8c0f"}
    : proj.sql >= MARCH_CO.sql * 0.85
    ? {label:`On pace with March — projecting ${sqlProjPct}% of March SQLs · ${mtgProjPct}% of Meetings · ${mqlProjPct}% of MQLs`, color:"#f5c518"}
    : {label:`Behind March pace — projecting ${sqlProjPct}% of March SQLs · ${mtgProjPct}% of Meetings · ${mqlProjPct}% of MQLs`, color:"#ef4444"};

  const metrics=[
    {label:"MQLs",    march:MARCH_CO.mql, mtd:APR_MTD_CO.mql, proj:proj.mql, gap:gap.mql, max:2200},
    {label:"SQLs",    march:MARCH_CO.sql, mtd:APR_MTD_CO.sql, proj:proj.sql, gap:gap.sql, max:500},
    {label:"Meetings",march:MARCH_CO.mtg, mtd:APR_MTD_CO.mtg, proj:proj.mtg, gap:gap.mtg, max:280},
  ];
  return(
    <div style={{...CS,border:`2px solid ${overallStatus.color}`,background:"#fafcf8",marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8,marginBottom:14}}>
        <div>
          <div style={{fontSize:11,fontWeight:800,letterSpacing:"2px",textTransform:"uppercase",color:MUTED,fontFamily:FONT_BODY}}>Company Pace — April vs March</div>
          <div style={{fontSize:13,fontWeight:700,color:overallStatus.color,marginTop:4,fontFamily:FONT_BODY}}>{overallStatus.label}</div>
        </div>
        <div style={{background:"#0d0d0d",color:"#fff",borderRadius:8,padding:"6px 16px",textAlign:"center"}}>
          <div style={{fontSize:9,opacity:0.6,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",fontFamily:FONT_BODY}}>Month elapsed</div>
          <div style={{fontSize:20,fontWeight:800,fontFamily:FONT_DISPLAY}}>{Math.round(APR_ELAPSED*100)}%</div>
          <div style={{fontSize:9,opacity:0.5,fontFamily:FONT_BODY}}>7 of ~22 days</div>
        </div>
      </div>

      {metrics.map(({label,march,mtd,proj:p,gap:g,max})=>{
        const ahead = p >= march;
        const projCol = p >= march*1.1?"#3a8c0f":p>=march*0.85?"#f5c518":"#ef4444";
        const mtdPct  = Math.round((mtd/march)*100);
        const projPct = Math.round((p/march)*100);
        const pctCol=(pct)=>pct>=110?"#3a8c0f":pct>=85?"#f5c518":"#ef4444";
        return(
          <div key={label} style={{marginBottom:12,paddingBottom:12,borderBottom:`1px solid ${BORDER}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:6}}>
              <span style={{fontWeight:800,fontSize:13,fontFamily:FONT_DISPLAY}}>{label}</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:12,fontWeight:800,color:pctCol(mtdPct),fontFamily:FONT_DISPLAY,background:"#f3f3f3",borderRadius:4,padding:"2px 10px"}}>{mtdPct}% now</span>
                <span style={{fontSize:12,fontWeight:800,color:pctCol(projPct),fontFamily:FONT_DISPLAY,background:pctCol(projPct)==="#3a8c0f"?"#f0f7e8":pctCol(projPct)==="#f5c518"?"#fffbea":"#fff0f0",borderRadius:4,padding:"2px 10px",border:`1px solid ${pctCol(projPct)}44`}}>→ {projPct}% proj</span>
                {ahead
                  ? <span style={{fontSize:11,fontWeight:700,color:"#3a8c0f",fontFamily:FONT_BODY}}>✓ Exceeding March</span>
                  : <span style={{fontSize:11,fontWeight:700,color:"#ef4444",fontFamily:FONT_BODY}}>Need {g} more</span>
                }
              </div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
              {[
                {k:"March Final", v:march, c:MUTED, pct:null},
                {k:"April MTD",   v:mtd,   c:paceCol(mtd,"sql"), pct:mtdPct},
                {k:"Proj EOM",    v:p,     c:projCol,             pct:projPct},

                <div key={k} style={{flex:1,minWidth:90,textAlign:"center",background:"#fff",border:`1px solid ${BORDER}`,borderRadius:6,padding:"8px 10px"}}>
                  <div style={{fontSize:9,color:MUTED,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",fontFamily:FONT_BODY}}>{k}</div>

                </div>
              ))}
            </div>
            {/* Dual bar: March vs Proj */}
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:10,color:MUTED,fontFamily:FONT_BODY,width:72}}>March (100%)</span>
                <div style={{flex:1,height:6,background:"#e5e5e5",borderRadius:3}}>
                  <div style={{width:`${Math.min(100,march/max*100)}%`,height:"100%",background:"#bebebe",borderRadius:3}}/>
                </div>
                <span style={{fontSize:10,color:MUTED,fontFamily:FONT_BODY,width:40,textAlign:"right"}}>{march}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:10,color:projCol,fontWeight:700,fontFamily:FONT_BODY,width:72}}>Proj ({projPct}%)</span>
                <div style={{flex:1,height:6,background:"#e5e5e5",borderRadius:3}}>
                  <div style={{width:`${Math.min(100,p/max*100)}%`,height:"100%",background:projCol,borderRadius:3}}/>
                </div>
                <span style={{fontSize:10,color:projCol,fontWeight:700,fontFamily:FONT_BODY,width:40,textAlign:"right"}}>{p}</span>
              </div>
            </div>
          </div>
        );
      })}
      <div style={{fontSize:10,color:MUTED,fontFamily:FONT_BODY,textAlign:"right"}}>
        March totals from ranking report · April MTD from team tab (Apr 9) · Proj = MTD ÷ {Math.round(APR_ELAPSED*100)}%
      </div>
    </div>
  );
}

// Uses visibility:hidden trick — only the modal prints, rest of page hidden
function usePrintStyle(){
  useEffect(()=>{
    const s=document.createElement('style');
    s.id='__mp';
    s.textContent=`@media print{body *{visibility:hidden!important}#__mpm,#__mpm *{visibility:visible!important}#__mpm{position:fixed;top:0;left:0;width:100%;padding:0}.__nop{display:none!important}}`;
    document.head.appendChild(s);
    return()=>document.getElementById('__mp')?.remove();
  },[]);
}

function loadScript(src){
  return new Promise((resolve,reject)=>{
    if(document.querySelector(`script[src="${src}"]`)){resolve();return;}
    const s=document.createElement('script');
    s.src=src; s.onload=resolve; s.onerror=reject;
    document.head.appendChild(s);
  });
}

const G_RGB=[90,171,31], DARK_RGB=[13,13,13], MUTED_RGB=[112,112,112], RED_RGB=[239,68,68], BORDER_RGB=[212,212,212], STRIPE_RGB=[243,243,243];

function pdfText(doc,txt,x,y,opts={}){
  if(txt==null) return;
  doc.text(String(txt),x,y,opts);
}

async function buildRepPDF(repName, accs){
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF('p','mm','a4');
  const W=210, M=12;
  const p=REP_PACE[repName];
  const active=accs.filter(a=>!a.end);
  const churned=accs.filter(a=>a.end);
  const today=new Date().toLocaleDateString('en-CA');
  let y=0;

  // ── Green header bar ──
  doc.setFillColor(...G_RGB);
  doc.rect(0,0,W,16,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(12); doc.setFont('helvetica','bold');
  pdfText(doc,'MARTAL GROUP',M,8);
  doc.setFontSize(7); doc.setFont('helvetica','normal');
  pdfText(doc,'B2B Lead Generation — Internal Use Only',M,13);
  pdfText(doc,'CONFIDENTIAL',W-M,8,{align:'right'});
  pdfText(doc,`Generated: ${today}`,W-M,13,{align:'right'});
  y=24;

  // ── Rep name ──
  doc.setTextColor(...DARK_RGB);
  doc.setFontSize(16); doc.setFont('helvetica','bold');
  pdfText(doc,repName,M,y); y+=6;
  doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.setTextColor(...MUTED_RGB);
  pdfText(doc,`Sales Execution Rep  ·  Period 3/16–4/15  ·  ${active.length} active  ·  ${churned.length} churned`,M,y); y+=5;
  doc.setDrawColor(...BORDER_RGB); doc.line(M,y,W-M,y); y+=7;

  // ── Performance Pulse ──
  if(p){
    // Section label + March Rank badge
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.setTextColor(...MUTED_RGB);
    pdfText(doc,'PERFORMANCE PULSE — PERIOD MTD (3/16–4/15)',M,y);
    if(p.marchRank!=null){
      doc.setFillColor(...DARK_RGB);
      doc.roundedRect(W-38,y-6,28,10,1.5,1.5,'F');
      doc.setTextColor(255,255,255);
      doc.setFontSize(6);
      pdfText(doc,'MARCH RANK',W-24,y-2,{align:'center'});
      doc.setFontSize(10); doc.setFont('helvetica','bold');
      pdfText(doc,`#${p.marchRank}`,W-24,y+3,{align:'center'});
    }
    y+=8;

    const metrics=[
      {label:'SQLs',    march:p.marchSQL,   cur:p.curSQL,  key:'sql', barMax:60},
      {label:'Meetings',march:p.marchFlips, cur:p.curMtg,  key:'mtg', barMax:35},
      {label:'MQLs',    march:p.marchMQL,   cur:p.curMQL,  key:'mql', barMax:160},
    ];
    const barL=46, barR=W-M, barW=barR-barL;
    const pctCol=(pct)=>pct>=110?G_RGB:pct>=85?[245,197,24]:[239,68,68];

    for(const m of metrics){
      const proj=Math.round(m.cur/APR_ELAPSED);
      const nowPct=m.march>0?Math.round((m.cur/m.march)*100):null;
      const projPct=m.march>0?Math.round((proj/m.march)*100):null;
      const delta=m.march!=null?m.cur-Math.round(m.march*APR_ELAPSED):null;
      const bMax=Math.max(m.march||1,m.cur,proj,1);
      const pCol=projPct!=null?pctCol(projPct):G_RGB;

      // Metric header row
      doc.setFontSize(7); doc.setFont('helvetica','bold');
      doc.setTextColor(...MUTED_RGB);
      pdfText(doc,m.label.toUpperCase(),M,y);
      if(nowPct!=null){
        doc.setTextColor(...pctCol(nowPct));
        pdfText(doc,`${nowPct}% now`,W-50,y,{align:'right'});
        doc.setTextColor(...pctCol(projPct));
        pdfText(doc,`→ ${projPct}% proj`,W-M,y,{align:'right'});
      }
      y+=4.5;

      // March final row
      doc.setFontSize(7.5); doc.setFont('helvetica','normal');
      doc.setTextColor(...MUTED_RGB);
      pdfText(doc,'March final',M,y);
      pdfText(doc,String(m.march??'—'),barL-2,y,{align:'right'});
      doc.setFillColor(200,200,200);
      const mW=m.march!=null?(m.march/bMax)*barW:0;
      doc.rect(barL,y-2.8,mW,2,'F');
      y+=4;

      // Period MTD row
      doc.setFont('helvetica','bold');
      doc.setTextColor(...G_RGB);
      pdfText(doc,'Period MTD',M,y);
      pdfText(doc,String(m.cur),barL-2,y,{align:'right'});
      doc.setFillColor(...G_RGB);
      doc.rect(barL,y-2.8,(m.cur/bMax)*barW,2,'F');
      if(delta!=null){
        const dc=delta>=0?G_RGB:RED_RGB;
        doc.setTextColor(...dc); doc.setFontSize(6.5);
        pdfText(doc,`${delta>=0?'+':''}${delta} vs pace`,W-M,y,{align:'right'});
        doc.setFontSize(7.5);
      }
      y+=4;

      // Proj EOM row
      doc.setTextColor(...pCol);
      pdfText(doc,'Proj EOM',M,y);
      pdfText(doc,String(proj),barL-2,y,{align:'right'});
      doc.setFillColor(...pCol);
      doc.rect(barL,y-2.8,(proj/bMax)*barW,2,'F');
      doc.setFontSize(6.5);
      pdfText(doc,`vs ${m.march} last mo`,W-M,y,{align:'right'});
      doc.setFontSize(7.5);
      y+=4;

      doc.setDrawColor(...BORDER_RGB); doc.line(M,y,W-M,y); y+=3.5;
    }
    y+=2;
  }

  // ── Churn stat cards (single row) ──
  const total=accs.length;
  const cr=total?((churned.length/total)*100).toFixed(1):0;
  const crNum=parseFloat(cr);
  const crColor=crNum<10?G_RGB:crNum<15?[245,197,24]:crNum<20?[249,115,22]:RED_RGB;
  const cs=churnScore(accs);
  const stats=[
    {l:'Active Accounts',v:String(active.length),c:G_RGB},
    {l:'Churned',v:String(churned.length),c:RED_RGB},
    {l:'Acct Churn Rate',v:`${cr}%`,c:crColor,s:'churned ÷ total'},
    {l:'12-Mo Avg CR',v:'—',c:[141,198,63]},
    {l:'Churn Score',v:String(cs),c:cs<15?G_RGB:cs<35?[141,198,63]:[188,217,122],s:'lower = better'},
  ];
  const cw=(W-M*2-4*3)/5;
  stats.forEach((st,i)=>{
    const cx=M+i*(cw+3);
    doc.setFillColor(255,255,255);
    doc.setDrawColor(...BORDER_RGB);
    doc.roundedRect(cx,y,cw,14,1,1,'FD');
    doc.setFontSize(6); doc.setFont('helvetica','bold');
    doc.setTextColor(...MUTED_RGB);
    pdfText(doc,st.l.toUpperCase(),cx+3,y+4);
    doc.setFontSize(11); doc.setFont('helvetica','bold');
    doc.setTextColor(...st.c);
    pdfText(doc,st.v,cx+3,y+11);
    if(st.s){doc.setFontSize(5.5);doc.setFont('helvetica','normal');doc.setTextColor(...MUTED_RGB);pdfText(doc,st.s,cx+3,y+13.5);}
  });
  y+=19;

  // ── Account table ──
  doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.setTextColor(...MUTED_RGB);
  pdfText(doc,`ACCOUNT DETAIL — ${total} ACCOUNTS`,M,y); y+=3;
  doc.setDrawColor(...BORDER_RGB); doc.line(M,y,W-M,y); y+=4;

  const cols=[M,75,95,120,158];
  const hdrs=['ACCOUNT','START','STATUS','REASON','REPS'];
  doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.setTextColor(...MUTED_RGB);
  hdrs.forEach((h,i)=>pdfText(doc,h,cols[i],y));
  y+=2; doc.setDrawColor(190,190,190); doc.line(M,y,W-M,y); y+=4;

  const sorted=[...accs].sort((a,b)=>a.end?1:-1);
  for(let i=0;i<sorted.length;i++){
    const a=sorted[i];
    if(y>278){doc.addPage();y=15;}
    if(i%2===1){doc.setFillColor(...STRIPE_RGB);doc.rect(M,y-3,W-M*2,5.5,'F');}
    doc.setFontSize(7.5); doc.setFont('helvetica','bold');
    doc.setTextColor(...DARK_RGB);
    pdfText(doc,a.name,cols[0],y);
    doc.setFont('helvetica','normal');
    doc.setTextColor(...MUTED_RGB);
    pdfText(doc,a.start||'',cols[1],y);

async function buildSomPDF(som){
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF('p','mm','a4');
  const W=210, M=12;
  const active=som.accounts.filter(a=>!a.end);
  const churned=som.accounts.filter(a=>a.end);
  const today=new Date().toLocaleDateString('en-CA');
  const pct=(c,m)=>(m!=null&&m>0)?Math.round(c/m*100)+'%':'—';
  const pr=c=>Math.round(c/APR_ELAPSED);
  const rows=som.reps.filter(r=>REP_PACE[r]).map(r=>({name:r,...REP_PACE[r]}))
    .sort((a,b)=>(b.marchRank?1/b.marchRank:0)-(a.marchRank?1/a.marchRank:0));
  let y=0;

  // Header
  doc.setFillColor(...G_RGB);
  doc.rect(0,0,W,16,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(12); doc.setFont('helvetica','bold');

  doc.setFontSize(7); doc.setFont('helvetica','normal');
  pdfText(doc,'Sales Operations Manager Report — Internal Use Only',M,13);
  pdfText(doc,'CONFIDENTIAL',W-M,8,{align:'right'});
  pdfText(doc,`Generated: ${today}`,W-M,13,{align:'right'});
  y=24;

  doc.setTextColor(...DARK_RGB);
  doc.setFontSize(16); doc.setFont('helvetica','bold');
  pdfText(doc,som.name,M,y); y+=6;
  doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.setTextColor(...MUTED_RGB);
  pdfText(doc,`Sales Operations Manager  ·  Period 3/16–4/15  ·  ${active.length} active  ·  ${churned.length} churned`,M,y); y+=5;
  doc.setDrawColor(...BORDER_RGB); doc.line(M,y,W-M,y); y+=7;

  // Team PACE table
  doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.setTextColor(...MUTED_RGB);
  pdfText(doc,`TEAM PACE — PERIOD MTD VS MARCH FINAL (${Math.round(APR_ELAPSED*100)}% ELAPSED)`,M,y); y+=4;
  doc.setDrawColor(...BORDER_RGB); doc.line(M,y,W-M,y); y+=4;

  const tc=[M,52,65,80,100,115,131,150,167];
  ['Rep','MR','SQLs','%now→proj','Proj','Mtgs','%now→proj','MQLs','%now→proj'].forEach((h,i)=>{
    doc.setFontSize(6); doc.setFont('helvetica','bold'); doc.setTextColor(...MUTED_RGB);

  });
  y+=2; doc.setDrawColor(190,190,190); doc.line(M,y,W-M,y); y+=4;

  for(let i=0;i<rows.length;i++){
    const r=rows[i];
    if(y>270){doc.addPage();y=15;}
    if(i%2===1){doc.setFillColor(...STRIPE_RGB);doc.rect(M,y-3,W-M*2,5,'F');}
    const st=sqlPaceStatus(r.curSQL,r.marchSQL);
    doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(...DARK_RGB);

    pdfText(doc,r.marchRank!=null?`#${r.marchRank}`:'—',tc[1],y);
    doc.setFont('helvetica','bold'); doc.setTextColor(...(paceCol(r.curSQL,'sql')==='#3a8c0f'?G_RGB:paceCol(r.curSQL,'sql')==='#f5c518'?[245,197,24]:RED_RGB));
    pdfText(doc,`${r.curSQL}/${r.marchSQL??'—'}`,tc[2],y);
    doc.setFont('helvetica','normal'); doc.setFontSize(6); doc.setTextColor(...(st?.color===G?G_RGB:MUTED_RGB));
    pdfText(doc,`${pct(r.curSQL,r.marchSQL)}→${pct(pr(r.curSQL),r.marchSQL)}`,tc[3],y);
    doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(...(st?.color===G?G_RGB:MUTED_RGB));
    pdfText(doc,String(pr(r.curSQL)),tc[4],y);

    pdfText(doc,`${pct(r.curMtg,r.marchFlips)}→${pct(pr(r.curMtg),r.marchFlips)}`,tc[6],y);
    doc.setFontSize(7);
    pdfText(doc,`${r.curMQL}/${r.marchMQL??'—'}`,tc[7],y);
    doc.setFontSize(6);
    pdfText(doc,`${pct(r.curMQL,r.marchMQL)}→${pct(pr(r.curMQL),r.marchMQL)}`,tc[8],y);
    y+=5;
  }
  y+=5;

  // Account table
  doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(...MUTED_RGB);

  doc.setDrawColor(...BORDER_RGB); doc.line(M,y,W-M,y); y+=4;
  const ac=[M,75,95,120,158];
  ['ACCOUNT','START','STATUS','REASON','REPS'].forEach((h,i)=>{doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(...MUTED_RGB);pdfText(doc,h,ac[i],y);});
  y+=2; doc.setDrawColor(190,190,190); doc.line(M,y,W-M,y); y+=4;

  const accsSort=[...active,...churned];
  for(let i=0;i<accsSort.length;i++){
    const a=accsSort[i];
    if(y>278){doc.addPage();y=15;}
    if(i%2===1){doc.setFillColor(...STRIPE_RGB);doc.rect(M,y-3,W-M*2,5.5,'F');}
    doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(...DARK_RGB);
    pdfText(doc,a.name,ac[0],y);
    doc.setFont('helvetica','normal'); doc.setTextColor(...MUTED_RGB);
    pdfText(doc,a.start||'',ac[1],y);
    doc.setFont('helvetica','bold'); doc.setTextColor(...(a.end?RED_RGB:G_RGB));
    pdfText(doc,a.end?`Churned ${a.end}`:'Active',ac[2],y);
    doc.setFont('helvetica','normal'); doc.setTextColor(...MUTED_RGB);
    pdfText(doc,a.reason||'—',ac[3],y);
    doc.setFontSize(6.5);
    const rs=(a.reps||[]).join(', ');
    pdfText(doc,rs.length>28?rs.slice(0,28)+'…':rs,ac[4],y);
    y+=5.5;
  }

  y+=4; doc.setDrawColor(...BORDER_RGB); doc.line(M,y,W-M,y); y+=4;
  doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(...MUTED_RGB);
  pdfText(doc,'Martal Group — Internal Use Only',M,y);
  pdfText(doc,`${som.name} · Period 3/16–4/15/2026`,W-M,y,{align:'right'});

  doc.save(`${som.name.replace(/\s+/g,'_')}_SOM_Report_Apr2026.pdf`);
}

function RepsTab(){
  const [sel,setSel]=useState("");
  const [printing,setPrinting]=useState(false);
  const accs=useMemo(()=>sel?getRepAccounts(sel):[], [sel]);
  const somNames=[...new Set(accs.map(a=>a.som))];
  return(<div>
    {printing&&sel&&<RepPrintModal repName={sel} accs={accs} onClose={()=>setPrinting(false)}/>}
    <div style={{marginBottom:20}}>
      <div style={{color:MUTED,fontSize:9,marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:"1.2px",fontFamily:FONT_BODY}}>Select Rep</div>

}
