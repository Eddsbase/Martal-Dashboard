function computeSDRMetrics(){
  return Object.keys(accountsData).map(name=>{
    const accts=accountsData[name];
    const activeMonths=accts.filter(v=>v!==null&&v>0).length;
    const totalMonths=accts.filter(v=>v!==null).length;
    const currentAccounts=accts[accts.length-1];
    const isActive=currentAccounts!==null&&currentAccounts>0;
    let firstActive=-1,lastActive=-1;
    for(let i=0;i<accts.length;i++){if(accts[i]!==null&&accts[i]>0){if(firstActive===-1)firstActive=i;lastActive=i;}}
    const tenure=lastActive>=0&&firstActive>=0?lastActive-firstActive+1:0;
    const peak=Math.max(...accts.filter(v=>v!==null));
    const retentionScore=totalMonths>0?Math.round(activeMonths/totalMonths*100):0;
    const reasons=churnReasons[name]||{};
    let churnScore=0;
    Object.entries(reasons).forEach(([r,c])=>{churnScore+=(churnWeights[r]||0)*c;});
    const controllable=(reasons["Rep Issue"]||0)+(reasons["Sales Ops Issue"]||0);
    const totalChurned=Object.values(reasons).reduce((s,v)=>s+v,0);
    const activeVals=accts.filter(v=>v!==null&&v>0);
    let trend="stable";
    if(activeVals.length>=3){const l=activeVals.slice(-3);if(l[2]>l[0])trend="up";else if(l[2]<l[0])trend="down";}
    return{name,accounts:accts,currentAccounts:currentAccounts||0,isActive,activeMonths,totalMonths,tenure,peak,retentionScore,churnScore,controllable,totalChurned,reasons,trend};
  }).sort((a,b)=>{
    if(a.isActive&&!b.isActive)return -1;
    if(!a.isActive&&b.isActive)return 1;
    return b.currentAccounts-a.currentAccounts;
  });
}
